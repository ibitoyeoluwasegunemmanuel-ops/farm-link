name: farmlink
description: FarmLink - Connecting Farmers, Buyers & Transporters
publish_to: 'none'
version: 1.0.0+1

environment:
	sdk: '>=3.0.0 <4.0.0'

dependencies:
	flutter:
		sdk: flutter
	cupertino_icons: ^1.0.2
  
	# Firebase
	firebase_core: ^2.24.2
	firebase_auth: ^4.16.0
	cloud_firestore: ^4.14.0
	firebase_storage: ^11.6.0
	firebase_messaging: ^14.7.10
  
	# State Management
	provider: ^6.1.1
	flutter_riverpod: ^2.4.9
  
	# UI Components
	google_fonts: ^6.1.0
	flutter_screenutil: ^5.9.0
	cached_network_image: ^3.3.1
	image_picker: ^1.0.7
	file_picker: ^6.1.1
  
	# Maps & Location
	google_maps_flutter: ^2.5.0
	geolocator: ^10.1.0
	geocoding: ^2.1.1
  
	# Payments
	flutter_paystack: ^1.0.7
  
	# Networking
	dio: ^5.4.0
	http: ^1.1.0
  
	# Utilities
	intl: ^0.18.1
	uuid: ^4.2.2
	shared_preferences: ^2.2.2
	flutter_dotenv: ^5.1.0
  
	# Chat
	flutter_chat_ui: ^1.6.10
	flutter_chat_types: ^3.6.2

dev_dependencies:
	flutter_test:
		sdk: flutter
	flutter_lints: ^3.0.0

flutter:
	uses-material-design: true
  
	assets:
		- assets/images/
		- assets/icons/
		- .env
